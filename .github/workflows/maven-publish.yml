name: Build CoreProtect

on:
  push:
    branches: [ master, main, developer ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Set project.branch
      run: sed -i 's|<project.branch>.*</project.branch>|<project.branch>developer</project.branch>|' pom.xml

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: CoreProtect-Plugin
        path: target/*.jar
        if-no-files-found: error
